AWSTemplateFormatVersion: "2010-09-09"
Description: >
  RALD OS — AWS SES email infrastructure for @rald.cloud
  Provisions SES domain identity, DKIM, MAIL FROM, and SMTP credentials
  for routing boyd@rald.cloud → Cloudflare Email routing → worker delivery.

Parameters:
  Domain:
    Type:    String
    Default: rald.cloud
  MailFromSubdomain:
    Type:    String
    Default: mail
  Environment:
    Type:    String
    Default: production
    AllowedValues: [production, staging]

Resources:
  # ── SES Domain Identity ─────────────────────────────────────────────────────
  RaldEmailIdentity:
    Type: AWS::SES::EmailIdentity
    Properties:
      EmailIdentity: !Ref Domain
      DkimAttributes:
        SigningEnabled: true
      MailFromAttributes:
        MailFromDomain:   !Sub "${MailFromSubdomain}.${Domain}"
        BehaviorOnMxFailure: UseDefaultValue
      FeedbackAttributes:
        EmailForwardingEnabled: true
      Tags:
        - Key: Project
          Value: rald-os
        - Key: Environment
          Value: !Ref Environment

  # ── Configuration Set (for event tracking) ─────────────────────────────────
  RaldSESConfigSet:
    Type: AWS::SES::ConfigurationSet
    Properties:
      Name: rald-transactional
      SendingOptions:
        SendingEnabled: true
      ReputationOptions:
        ReputationMetricsEnabled: true
      TrackingOptions:
        CustomRedirectDomain: !Sub "links.${Domain}"
      VdmOptions:
        DashboardOptions:
          EngagementMetrics: ENABLED
        GuardianOptions:
          OptimizedSharedDelivery: ENABLED

  # ── SMTP IAM User (for Cloudflare Worker email sending) ─────────────────────
  RaldSMTPUser:
    Type: AWS::IAM::User
    Properties:
      UserName: rald-ses-smtp
      Tags:
        - Key: Project
          Value: rald-os

  RaldSMTPUserPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: rald-ses-send-email
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - ses:SendEmail
              - ses:SendRawEmail
              - ses:SendTemplatedEmail
            Resource: "*"
            Condition:
              StringEquals:
                ses:FromAddress:
                  - !Sub "noreply@${Domain}"
                  - !Sub "auth@${Domain}"
                  - !Sub "verify@${Domain}"
      Users: [!Ref RaldSMTPUser]

  RaldSMTPAccessKey:
    Type: AWS::IAM::AccessKey
    Properties:
      UserName: !Ref RaldSMTPUser

  # ── SSM: store SMTP credentials for workers ─────────────────────────────────
  RaldSMTPKeyIdParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name:  /rald/ses/smtp-access-key-id
      Type:  String
      Value: !Ref RaldSMTPAccessKey
      Tags:  { Project: rald-os }

  RaldSMTPKeySecretParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name:  /rald/ses/smtp-secret-access-key
      Type:  String
      Value: !GetAtt RaldSMTPAccessKey.SecretAccessKey
      Tags:  { Project: rald-os }

Outputs:
  DomainIdentityArn:
    Value:  !GetAtt RaldEmailIdentity.DkimDNSTokenName1
    Description: "DKIM token 1 — add as CNAME in Cloudflare DNS"
  SmtpEndpoint:
    Value:  !Sub "email-smtp.${AWS::Region}.amazonaws.com"
    Description: "SES SMTP endpoint for Cloudflare Worker email sending"
  SmtpPort:
    Value:  "587"
  SmtpKeyIdSSM:
    Value:  /rald/ses/smtp-access-key-id
  SmtpSecretSSM:
    Value:  /rald/ses/smtp-secret-access-key
  ConfigSetName:
    Value:  rald-transactional
