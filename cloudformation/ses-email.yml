AWSTemplateFormatVersion: "2010-09-09"
Description: >
  RALD OS — AWS SES email infrastructure for @rald.cloud
  Provisions SES domain identity with DKIM, MAIL FROM subdomain,
  SMTP IAM user, and SSM parameters for Cloudflare Worker email delivery.

Parameters:
  Domain:
    Type:    String
    Default: rald.cloud
  Environment:
    Type:    String
    Default: production

Resources:
  # ── SES Domain Identity ─────────────────────────────────────────────────────
  RaldEmailIdentity:
    Type: AWS::SES::EmailIdentity
    Properties:
      EmailIdentity: !Ref Domain
      DkimSigningAttributes:
        NextSigningKeyLength: RSA_2048_BIT
      MailFromAttributes:
        MailFromDomain:        !Sub "mail.${Domain}"
        BehaviorOnMxFailure:   UseDefaultValue
      FeedbackAttributes:
        EmailForwardingEnabled: true
      Tags:
        - Key: Project
          Value: rald-os
        - Key: Environment
          Value: !Ref Environment

  # ── SES Configuration Set ───────────────────────────────────────────────────
  RaldSESConfigSet:
    Type: AWS::SES::ConfigurationSet
    Properties:
      Name: rald-transactional
      SendingOptions:
        SendingEnabled: true
      ReputationOptions:
        ReputationMetricsEnabled: true

  # ── SMTP IAM User ────────────────────────────────────────────────────────────
  RaldSMTPUser:
    Type: AWS::IAM::User
    Properties:
      UserName: rald-ses-smtp
      Tags:
        - Key: Project
          Value: rald-os

  RaldSMTPUserPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: rald-ses-send-email
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - ses:SendEmail
              - ses:SendRawEmail
            Resource: "*"
      Users: [!Ref RaldSMTPUser]

  RaldSMTPAccessKey:
    Type: AWS::IAM::AccessKey
    Properties:
      UserName: !Ref RaldSMTPUser
    DependsOn: RaldSMTPUser

  # ── SSM Parameters ───────────────────────────────────────────────────────────
  RaldSMTPKeyIdParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name:  /rald/ses/smtp-access-key-id
      Type:  String
      Value: !Ref RaldSMTPAccessKey
      Tags:  { Project: rald-os }

  RaldSMTPKeySecretParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name:  /rald/ses/smtp-secret-access-key
      Type:  String
      Value: !GetAtt RaldSMTPAccessKey.SecretAccessKey
      Tags:  { Project: rald-os }

Outputs:
  DomainIdentity:
    Value:       !Ref RaldEmailIdentity
    Description: "SES domain identity — verify DKIM in Cloudflare DNS after deploy"
  SmtpEndpoint:
    Value:       !Sub "email-smtp.${AWS::Region}.amazonaws.com"
    Description: "SES SMTP endpoint — use with SMTP credentials from SSM"
  SmtpPort:
    Value:       "587"
  SmtpKeyIdSSM:
    Value:       /rald/ses/smtp-access-key-id
  SmtpSecretSSM:
    Value:       /rald/ses/smtp-secret-access-key
  ConfigSetName:
    Value:       rald-transactional
