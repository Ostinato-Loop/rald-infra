name: Deploy AWS Infrastructure

on:
  push:    { branches: [main] }
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required:    true
        default:     production
        type:        choice
        options:     [production, staging]

concurrency:
  group: aws-infra-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION:  ${{ secrets.AWS_REGION }}
  CFN_BUCKET:  rald-cfn-${{ secrets.AWS_ACCOUNT_ID }}

jobs:
  deploy-infra:
    name: Deploy CloudFormation stacks
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents:  read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Ensure CFN template bucket exists
        run: |
          BUCKET="rald-cfn-$(aws sts get-caller-identity --query Account --output text)"
          echo "CFN_BUCKET=$BUCKET" >> $GITHUB_ENV
          aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null \
            || aws s3 mb "s3://$BUCKET" --region "$AWS_REGION"
          aws s3api put-bucket-versioning --bucket "$BUCKET" \
            --versioning-configuration Status=Enabled
          echo "Template bucket: $BUCKET ✓"

      - name: Upload CloudFormation templates to S3
        run: |
          aws s3 sync cloudformation/ "s3://$CFN_BUCKET/" \
            --delete --exclude "*.md" \
            --sse aws:kms
          echo "Templates uploaded ✓"

      - name: Deploy SES Email Stack
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/ses-email.yml \
            --stack-name rald-ses-email \
            --parameter-overrides Environment=production \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset \
            --tags Project=rald-os Environment=production
          echo "SES stack deployed ✓"

      - name: Deploy S3+CDN Stack
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/s3-cdn.yml \
            --stack-name rald-assets-cdn \
            --no-fail-on-empty-changeset \
            --tags Project=rald-os Environment=production
          echo "CDN stack deployed ✓"

      - name: Fetch and print stack outputs
        run: |
          echo "=== SES Stack Outputs ==="
          aws cloudformation describe-stacks --stack-name rald-ses-email \
            --query 'Stacks[0].Outputs' --output table || true
          echo ""
          echo "=== CDN Stack Outputs ==="
          aws cloudformation describe-stacks --stack-name rald-assets-cdn \
            --query 'Stacks[0].Outputs' --output table || true

      - name: Upload initial SDK docs to CDN bucket
        run: |
          BUCKET=$(aws cloudformation describe-stacks --stack-name rald-assets-cdn \
            --query 'Stacks[0].Outputs[?OutputKey==`BucketName`].OutputValue' \
            --output text)
          echo "# RALD OS Assets" > /tmp/index.html
          aws s3 cp /tmp/index.html "s3://$BUCKET/index.html" \
            --content-type text/html || echo "WARN: asset upload failed"
          echo "Assets bucket populated ✓"

      - name: Audit log
        if: always()
        run: |
          echo "AUDIT service=rald-infra commit=${{ github.sha }} actor=${{ github.actor }} ts=$(date -u +%Y-%m-%dT%H:%M:%SZ) status=${{ job.status }}"
