name: CI — Validate CloudFormation

on:
  push:    { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  validate:
    name: Validate CFN templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}
      - name: Validate SES template
        run: aws cloudformation validate-template --template-body file://cloudformation/ses-email.yml
      - name: Validate CDN template
        run: aws cloudformation validate-template --template-body file://cloudformation/s3-cdn.yml
      - run: echo "All CFN templates valid ✓"
